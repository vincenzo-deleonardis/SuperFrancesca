<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Super Francesca</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #87CEEB;
  touch-action: manipulation;
  -webkit-touch-callout: none;
  -webkit-user-select: none;
  user-select: none;
  font-family: sans-serif;
}
canvas {
  display: block !important;
  position: fixed !important;
  top: 0 !important; left: 0 !important;
  width: 100vw !important;
  height: 100vh !important;
  min-height: 100vh !important;
  background: #87CEEB !important;
  touch-action: manipulation;
  -webkit-touch-callout: none;
}
#rotate-msg {
  display: none; position: fixed; inset: 0; z-index: 1000;
  background: linear-gradient(135deg, #2e1065, #4c1d95);
  color: #e9d5ff; flex-direction: column; align-items: center;
  justify-content: center; font-family: sans-serif; text-align: center; gap: 24px;
  transition: opacity 0.7s ease-out;
}
#rotate-msg .icon { font-size: 72px; animation: spin 2s ease-in-out infinite; }
#rotate-msg .text { font-size: 22px; font-weight: bold; }
@keyframes spin { 0%,100%{transform:rotate(0deg)} 50%{transform:rotate(-90deg)} }
#hud {
  position: fixed; top: 12px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 24px; align-items: center; z-index: 20; pointer-events: none;
  background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.18);
  border-radius: 16px; padding: 8px 28px;
  backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
  box-shadow: 0 4px 24px rgba(0,0,0,0.2);
}
#hud span { color: #fff; font-size: 17px; font-weight: bold; text-shadow: 0 1px 4px rgba(0,0,0,0.4); }
#hud .hearts { color: #f43f5e; font-size: 20px; letter-spacing: 2px; }
#popup-text {
  position: fixed; top: 18%; left: 50%; transform: translateX(-50%);
  font: bold 28px sans-serif; color: #fff; text-shadow: 0 2px 8px rgba(0,0,0,0.5);
  pointer-events: none; z-index: 20; opacity: 0; transition: opacity 0.25s;
  background: rgba(0,0,0,0.25); padding: 6px 22px; border-radius: 14px;
  backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
  border: 1px solid rgba(255,255,255,0.15);
}
#popup-text.show { opacity: 1; }
#overlay {
  position: fixed; inset: 0; z-index: 30; display: flex; flex-direction: column;
  align-items: center; justify-content: center; pointer-events: none;
}
#overlay.active { pointer-events: auto; }
#overlay .box {
  background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.15);
  border-radius: 24px; padding: 36px 56px; text-align: center;
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  box-shadow: 0 8px 40px rgba(0,0,0,0.35);
  max-height: 85vh; overflow-y: auto;
}
#overlay h1 { color: #fbbf24; font-size: 42px; margin-bottom: 10px; text-shadow: 0 2px 8px rgba(0,0,0,0.4); }
#overlay h1.red { color: #f43f5e; }
#overlay p { color: #e9d5ff; font-size: 18px; margin: 6px 0; }
#overlay .blink { animation: blinker 1.2s ease-in-out infinite; color: #fde68a; font-weight: bold; margin-top: 16px; }
@keyframes blinker { 0%,100%{opacity:1} 50%{opacity:0.2} }
#pause-btn {
  position: fixed; top: 12px; right: 16px; z-index: 25;
  width: 44px; height: 44px; border-radius: 50%;
  background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.25);
  color: #fff; font-size: 20px; cursor: pointer; display: none;
  align-items: center; justify-content: center;
  backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  transition: background 0.15s;
}
#pause-btn:hover { background: rgba(255,255,255,0.22); }
#star-timer {
  position: fixed; top: 12px; left: 16px; z-index: 20;
  background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.18);
  border-radius: 12px; padding: 6px 14px;
  color: #fde68a; font-size: 15px; font-weight: bold;
  backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
  display: none; pointer-events: none;
}
@keyframes starBounce { 0%{transform:scale(0) rotate(-20deg)} 60%{transform:scale(1.3) rotate(5deg)} 100%{transform:scale(1) rotate(0deg)} }
.star-rating span { display:inline-block; font-size:36px; opacity:0; animation: starBounce 0.4s forwards; }
.star-rating span:nth-child(2) { animation-delay: 0.2s; }
.star-rating span:nth-child(3) { animation-delay: 0.4s; }

/* Boss HP bar */
#boss-bar {
  display: none; position: fixed; top: 60px; left: 50%; transform: translateX(-50%);
  width: 240px; height: 14px; z-index: 20; pointer-events: none;
  background: rgba(0,0,0,0.4); border-radius: 7px; overflow: hidden;
  border: 1px solid rgba(255,255,255,0.2);
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
}
#boss-bar::before {
  content: '👑 RE FANTASMA'; position: absolute; top: -18px; left: 50%;
  transform: translateX(-50%); color: #e9d5ff; font-size: 11px; font-weight: bold;
  white-space: nowrap; text-shadow: 0 1px 4px rgba(0,0,0,0.6);
}
#boss-bar-fill {
  height: 100%; background: #a855f7; border-radius: 7px;
  transition: width 0.3s ease, background 0.3s ease;
}

/* Dash cooldown indicator */
#dash-cooldown {
  display: none; position: fixed; bottom: 120px; right: 24px;
  width: 40px; height: 40px; border-radius: 50%; z-index: 20; pointer-events: none;
  border: 2px solid rgba(255,255,255,0.3);
}

/* Flash overlay */
#flash-overlay {
  position: fixed; inset: 0; z-index: 28; pointer-events: none;
  background: white; opacity: 0; transition: opacity 0.15s ease-out;
}

/* Outfit system styles */
.outfit-btn {
  margin-top: 16px; padding: 10px 28px; font-size: 16px; font-weight: bold;
  color: #fff; background: rgba(168,85,247,0.4); border: 1px solid rgba(255,255,255,0.25);
  border-radius: 16px; cursor: pointer;
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  transition: background 0.15s, transform 0.1s;
}
.outfit-btn:hover { background: rgba(168,85,247,0.6); transform: scale(1.05); }
.outfit-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;
  margin: 12px 0; max-width: 380px;
}
.outfit-card {
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  padding: 14px 8px; border-radius: 16px; cursor: pointer; border: 2px solid transparent;
  background: rgba(255,255,255,0.08); transition: all 0.15s;
  color: #e9d5ff; font-size: 13px; font-weight: bold;
}
.outfit-card:hover { background: rgba(255,255,255,0.15); transform: scale(1.05); }
.outfit-card.selected { border-color: #fbbf24; background: rgba(251,191,36,0.15); }
.outfit-card.locked { opacity: 0.5; cursor: not-allowed; }
.outfit-card.locked:hover { transform: none; }
.outfit-icon { font-size: 36px; }
.outfit-name { font-size: 12px; }
.outfit-lock-text { font-size: 10px; color: #a78bfa; }
.outfit-close-btn {
  margin-top: 12px; padding: 8px 24px; font-size: 14px; font-weight: bold;
  color: #fff; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
  border-radius: 12px; cursor: pointer; transition: background 0.15s;
}
.outfit-close-btn:hover { background: rgba(255,255,255,0.2); }

/* Mobile responsive */
@media (max-width: 600px) {
  #overlay .box { padding: 20px 20px; border-radius: 18px; }
  #overlay h1 { font-size: 28px; margin-bottom: 6px; }
  #overlay p { font-size: 14px; margin: 4px 0; }
  #overlay .blink { font-size: 14px; margin-top: 10px; }
  .outfit-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; max-width: 260px; }
  .outfit-card { padding: 10px 6px; }
  .outfit-icon { font-size: 28px; }
  .outfit-name { font-size: 11px; }
  .outfit-btn { padding: 8px 20px; font-size: 14px; }
  #popup-text { font-size: 20px; padding: 4px 14px; }
  #hud { gap: 12px; padding: 6px 14px; }
  #hud span { font-size: 14px; }
  #hud .hearts { font-size: 16px; }
  #boss-bar { width: 180px; top: 50px; }
}
@media (max-height: 400px) {
  #overlay .box { padding: 14px 16px; max-height: 90vh; }
  #overlay h1 { font-size: 24px; }
  #overlay p { font-size: 13px; }
  .outfit-grid { grid-template-columns: repeat(3, 1fr); gap: 6px; }
  .outfit-card { padding: 6px 4px; }
  .outfit-icon { font-size: 22px; }
}

/* Touch controls */
#touch-controls {
  display: none;
  position: fixed; bottom: 0; left: 0; right: 0;
  z-index: 100;
  padding: 0 12px 12px 12px;
  justify-content: space-between;
  align-items: flex-end;
  pointer-events: none;
}
#touch-controls .tc-left,
#touch-controls .tc-right {
  display: flex; gap: 10px; pointer-events: none;
}
#touch-controls button {
  pointer-events: auto;
  border: 2px solid rgba(255,255,255,0.22);
  font-weight: bold;
  color: rgba(255,255,255,0.92);
  background: rgba(140,90,200,0.35);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  box-shadow: 0 4px 18px rgba(0,0,0,0.28), inset 0 1px 0 rgba(255,255,255,0.15);
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.06s, background 0.06s;
  -webkit-tap-highlight-color: transparent;
  outline: none;
  cursor: pointer;
}
#touch-controls .tc-left button {
  width: 68px; height: 68px;
  border-radius: 50%;
  font-size: 26px;
}
#touch-controls .tc-right button {
  width: 80px; height: 68px;
  border-radius: 34px;
  font-size: 15px;
  letter-spacing: 1px;
}
#touch-controls button.pressed {
  transform: scale(0.92);
  background: rgba(200,140,255,0.55);
  border-color: rgba(255,255,255,0.4);
}
@media (pointer: coarse) {
  #touch-controls { display: flex; }
}
/* landscape small height */
@media (max-height: 440px) {
  #touch-controls { padding-bottom: 6px; }
  #touch-controls .tc-left button { width: 58px; height: 58px; font-size: 22px; }
  #touch-controls .tc-right button { width: 70px; height: 58px; font-size: 13px; }
}
/* portrait mode */
@media (pointer: coarse) and (orientation: portrait) {
  #touch-controls {
    padding: 0 16px 16px 16px;
  }
  #touch-controls .tc-left button {
    width: 64px; height: 64px; font-size: 24px;
  }
  #touch-controls .tc-right button {
    width: 74px; height: 64px; font-size: 14px; border-radius: 32px;
  }
  #touch-controls .tc-right { flex-direction: column; gap: 8px; }
}
/* very small screens */
@media (pointer: coarse) and (max-width: 400px) {
  #touch-controls .tc-left button { width: 56px; height: 56px; font-size: 20px; }
  #touch-controls .tc-right button { width: 64px; height: 56px; font-size: 12px; }
}
</style>
</head>
<body>
<div id="rotate-msg">
  <div class="icon">📱</div>
  <div class="text">Ruota il telefono ↺</div>
  <div style="font-size:15px;opacity:0.7;">Il gioco funziona in modalità orizzontale</div>
</div>
<button id="pause-btn">⏸</button>
<div id="star-timer">⏱ 0s</div>
<div id="boss-bar"><div id="boss-bar-fill"></div></div>
<div id="dash-cooldown"></div>
<div id="flash-overlay"></div>
<div id="hud">
  <span class="hearts" id="hud-hearts">♥♥♥</span>
  <span id="hud-score">Punti: 0</span>
  <span id="hud-level">Lv.1</span>
  <span id="hud-best" style="color:#fde68a;font-size:13px;"></span>
</div>
<div id="popup-text"></div>
<div id="overlay" class="active">
  <div class="box" id="overlay-box">
    <h1>Super Francesca</h1>
    <p>Salta sui cuscini, raccogli le ciambelle<br>e attenta ai fantasmini!</p>
    <p style="font-size:14px;color:#c4b5fd;margin-top:12px;">← → muoversi &nbsp;|&nbsp; ↑/SPAZIO saltare &nbsp;|&nbsp; SHIFT scatto</p>
    <p class="blink">Premi SPAZIO o SALTA per iniziare</p>
  </div>
</div>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module" src="src/main.js"></script>
</body>
</html>
